description:
  de:
    genericName: "Echtzeit-Chat-Relay"
    shortDescription: >
      Echtzeit-WebSocket-Relay für Chat-Übertragung der KODI-Template-B-Variante.
    longDescription: >
      Das WebSocket-Relay ist Teil von KODI – Kommunen Digital, einer quelloffenen Plattform-Familie für digitale Bürgerdienste deutscher Kommunen. Diese Komponente gehört zur Template-B-Variante des KODI-Baukastens und kann eigenständig betrieben oder mit den übrigen KODI-Bausteinen (Backend, Web-Frontend, mobile App und ergänzende Dienste) zu einer vollständigen kommunalen Lösung kombiniert werden. Echtzeit-WebSocket-Relay für Chat-Übertragung der KODI-Template-B-Variante. Die Software ist unter der EUPL-1.2 lizenziert und für den produktiven Einsatz in öffentlichen Verwaltungen vorgesehen. Sie folgt dem Metadatenstandard publiccode.yml und ist über das openCode-Softwareverzeichnis auffindbar, damit andere Verwaltungen die Lösung nachnutzen und gemeinsam weiterentwickeln können.
    features:
      - Open Source (EUPL-1.2)
      - Nachnutzbar durch öffentliche Verwaltungen
  en:
    genericName: "Municipal citizen service"
    shortDescription: >
      Real-time WebSocket relay for chat transport of the KODI Template B variant.
    longDescription: >
      This building block is part of KODI – Kommunen Digital, an open-source platform family for digital citizen services of German municipalities. The component belongs to the Template B variant of the KODI toolkit and can be operated standalone or combined with the other KODI building blocks (backend, web frontend, mobile app and supporting services) to form a complete municipal solution. Real-time WebSocket relay for chat transport of the KODI Template B variant. The software is licensed under the EUPL-1.2 and intended for productive use in public administrations. It follows the publiccode.yml metadata standard and is discoverable through the openCode software directory so that other administrations can reuse and jointly maintain the solution.
    features:
      - Open source (EUPL-1.2)
      - Reusable by public administrations

